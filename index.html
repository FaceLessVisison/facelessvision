
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faceless Vision</title>
<style>
  body{margin:0;font-family:Arial;background:#111;color:white;}
  nav{display:flex;justify-content:space-between;align-items:center;background:black;padding:15px 30px;}
  nav h1{margin:0;letter-spacing:2px;}
  nav ul{list-style:none;display:flex;gap:20px;margin:0;padding:0;}
  nav ul li{cursor:pointer;}
  nav ul li:hover{color:gray;}
  .hero{height:60vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:#1a1a1a;}
  .hero h2{font-size:40px;margin-bottom:10px;}
  .shop{padding:40px;text-align:center;}
  .products{display:flex;justify-content:center;gap:30px;flex-wrap:wrap;}
  .product{background:#222;padding:20px;border-radius:10px;width:200px;transition:0.3s;}
  .product:hover{transform:scale(1.05);}
  .product img{width:100%;border-radius:10px;}
  button{margin-top:10px;padding:10px 15px;border:none;background:white;color:black;cursor:pointer;font-weight:bold;}
  button:hover{background:gray;}
  .cart{position:fixed;top:20px;right:20px;background:black;padding:10px 15px;border-radius:20px;}
  footer{text-align:center;padding:20px;background:black;margin-top:40px;}
</style>
</head>
<body>

<nav>
<h1>FACELESS VISION</h1>
<ul>
<li onclick="scrollToSection('home')">Home</li>
<li onclick="scrollToSection('shop')">Shop</li>
<li>Cart (<span id="cart-count">0</span>)</li>
</ul>
</nav>

<section id="home" class="hero">
<h2>Faceless Vision</h2>
<p>Move in silence. Let the vision speak.</p>
</section>

<section id="shop" class="shop">
<h2>Shop</h2>
<div class="products">

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Faceless Vision Hoodie</h3>
<p>$50</p>
<button onclick="addToCart('Faceless Vision Hoodie')">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Faceless Vision Tee</h3>
<p>$30</p>
<button onclick="addToCart('Faceless Vision Tee')">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Faceless Vision Hat</h3>
<p>$25</p>
<button onclick="addToCart('Faceless Vision Hat')">Add to Cart</button>
</div>

</div>
</section>

<footer>
<p>© 2026 Faceless Vision</p>
</footer>

<script>
let cartCount = 0;

function addToCart(product){
  cartCount++;
  document.getElementById("cart-count").innerText = cartCount;
  alert(product + " added to cart");
}

function scrollToSection(section){
  document.getElementById(section).scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
