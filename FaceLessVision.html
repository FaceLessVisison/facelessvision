<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Faceless Vision | Official</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

/* BACKGROUND IMAGE */
background-image:url("IMG_0974.JPG");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
position:relative;
}

/* DARK OVERLAY */
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:0;
}

/* MAIN CARD */
.card{
position:relative;
z-index:1;
background:rgba(255,255,255,0.92);
padding:40px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
width:320px;
backdrop-filter:blur(6px);
}

/* PROFILE IMAGE */
.card img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
}

/* TITLE */
.card h1{
margin:10px 0;
font-size:26px;
color:#222;
}

/* DESCRIPTION */
.card p{
color:#555;
font-size:16px;
margin-top:10px;
}

/* BUTTON */
button{
margin-top:25px;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:8px;
background:#00c853;
color:white;
cursor:pointer;
transition:0.25s;
}

button:hover{
transform:scale(1.06);
background:#00b44a;
}

a{
text-decoration:none;
}

/* MOBILE */
@media (max-width:400px){

.card{
width:90%;
padding:30px 20px;
}

.card img{
width:100px;
height:100px;
}

.card h1{
font-size:22px;
}

.card p{
font-size:14px;
}

button{
padding:12px 24px;
font-size:16px;
}

}

</style>
</head>

<body>

<div class="card">

<img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=500&q=80" alt="Profile">

<h1>Faceless Vision</h1>

<p>
Welcome to Faceless Vision.  
A brand built on creativity, identity, and vision without limits.
</p>

<a href="https://cash.app/$Nay3ean" target="_blank">
<button>Support Faceless Vision</button>
</a>

</div>

</body>
</html>
